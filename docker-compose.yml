services:
  website:
    image: ${DOCKER_IMAGE:-dukerupert/all-season-heating-and-air:latest}
    container_name: all-season-heating-and-air
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-3007}:${PORT:-80}"
    environment:
      PORT: "${PORT:-80}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT:-80}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
