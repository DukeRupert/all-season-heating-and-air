<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Params.description | default .Site.Params.description }}">
  <meta name="author" content="{{ .Site.Title }}">

  <!-- Geo meta -->
  <meta name="geo.region" content="US-MT">
  <meta name="geo.placename" content="Helena">
  <meta name="geo.position" content="46.5927;-112.0361">
  <meta name="ICBM" content="46.5927, -112.0361">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Params.description | default .Site.Params.description }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ .Params.description | default .Site.Params.description }}">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-image.jpg">

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Preload critical assets -->
  <link rel="preload" href="/images/hero.jpg" as="image">
  <link rel="preload" href="/images/logo-white.png" as="image">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  {{ $styles := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $styles.RelPermalink }}" integrity="{{ $styles.Data.Integrity }}">

  {{ block "head" . }}{{ end }}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  {{ partial "header.html" . }}

  <main id="main-content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "schema.html" . }}

  {{ block "scripts" . }}{{ end }}
</body>
</html>
